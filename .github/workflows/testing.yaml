# Action test/validation workflow
name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  ### Test the GitHub Action in this Repository ###
  tests:
    name: "Test local GitHub Action"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10 # Increase this timeout value as needed
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: "Checkout repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Perform setup prior to running test(s)
      - name: "Testing setup step"
        shell: bash
        run: |
          # Testing setup step
          echo "Testing setup step"
          echo "Testing setup step/summary output" >> "$GITHUB_STEP_SUMMARY"

      - name: "Running local action: ${{ github.repository }}"
        uses: ./
        id: docker-login
        continue-on-error: true
        with:
          nexus3-registry: "nexus3.example.org"
          nexus3-user: "test-user"
          nexus3-password: "test-password"
          dockerhub-user: "test-user"
          dockerhub-password: "test-password"

      # Action uses real registries; expect failure in CI
      - name: "Validated local action: ${{ github.repository }}"
        shell: bash
        run: |
          # Local action validation
          echo "Action was invoked successfully"
          echo "Validation step summary" >> "$GITHUB_STEP_SUMMARY"

      # yamllint disable-line rule:line-length
      - name: "Running local action: ${{ github.repository }} [Override Failure]"
        uses: ./
        id: failure
        continue-on-error: true
        with:
          nexus3-registry: "nexus3.invalid.example"
          nexus3-user: "bad-user"
          nexus3-password: "bad-password"
          dockerhub-user: "bad-user"
          dockerhub-password: "bad-password"

      - name: "Confirmed action ran without crash"
        shell: bash
        run: |
          # Confirm the action executed without crashing
          echo "Action executed: ${{ github.repository }}"
          echo "Action execution confirmed ✅" >> "$GITHUB_STEP_SUMMARY"
